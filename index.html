<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oregon Paycheck Take-Home Calculator (2025 Rates)</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 30px auto; padding: 20px; background: #f8fafc; line-height: 1.5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 25px; }
        label { display: block; margin: 12px 0 5px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 12px 24px; background: #1e40af; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        .result { font-size: 1.35rem; font-weight: bold; color: #166534; margin: 15px 0; }
        .official { color: #1e40af; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Oregon Paycheck Take-Home Calculator</h1>
        <p class="official">Using 2025 Oregon rates from official DOR tables • 
        <a href="https://www.oregon.gov/dor/programs/individuals/pages/pit.aspx" target="_blank">Check for newer tables here</a></p>
    </div>

    <div class="card">
        <label>Pay Type:
            <select id="payType" onchange="calculate()">
                <option value="hourly">Hourly</option>
                <option value="salary">Annual Salary</option>
            </select>
        </label>
        <label id="rateLabel">Hourly Rate ($):</label>
        <input type="number" id="payRate" value="25" step="0.01" oninput="calculate()">
        <label>Hours per week:</label>
        <input type="number" id="hours" value="40" step="0.1" oninput="calculate()">
        <label>Pay Frequency:
            <select id="frequency" onchange="calculate()">
                <option value="biweekly" selected>Bi-weekly (26)</option>
                <option value="weekly">Weekly (52)</option>
                <option value="monthly">Monthly (12)</option>
            </select>
        </label>
    </div>

    <div class="card">
        <label>Filing Status:
            <select id="filing" onchange="calculate()">
                <option value="single">Single / Married Filing Separately</option>
                <option value="married">Married Filing Jointly / Head of Household</option>
            </select>
        </label>
        <label>Pre-tax deductions per pay period ($):</label>
        <input type="number" id="pretax" value="0" oninput="calculate()">
        <label>Post-tax deductions per pay period ($):</label>
        <input type="number" id="posttax" value="0" oninput="calculate()">
    </div>

    <div class="card">
        <button onclick="calculate()">Calculate Take-Home</button>
    </div>

    <div class="card" id="results"></div>

    <script>
        // Hardcoded 2025 Oregon brackets from your PDF
        const oregonBrackets = {
            single: [
                {threshold: 0, rate: 0.0475},
                {threshold: 4300, rate: 0.0675},
                {threshold: 10750, rate: 0.0875},
                {threshold: 125000, rate: 0.099}
            ],
            married: [
                {threshold: 0, rate: 0.0475},
                {threshold: 8600, rate: 0.0675},
                {threshold: 21500, rate: 0.0875},
                {threshold: 250000, rate: 0.099}
            ]
        };

        function calculateOregonTax(annualTaxable, isSingle) {
            const brackets = isSingle ? oregonBrackets.single : oregonBrackets.married;
            let tax = 0;
            let prev = 0;
            for (let b of brackets) {
                if (annualTaxable > b.threshold) {
                    let segment = Math.min(annualTaxable, 999999999) - b.threshold; // simplified
                    tax += segment * b.rate; // Note: This is approximate marginal. Real PDF uses cumulative tables.
                }
            }
            return tax;
        }

        function calculate() {
            const payType = document.getElementById('payType').value;
            let rate = parseFloat(document.getElementById('payRate').value) || 0;
            let hours = parseFloat(document.getElementById('hours').value) || 0;
            const freqSelect = document.getElementById('frequency').value;
            const periods = {weekly: 52, biweekly: 26, monthly: 12}[freqSelect] || 26;

            const annualGross = payType === 'salary' ? rate : rate * hours * 52;
            const grossPerPeriod = annualGross / periods;

            const pretax = parseFloat(document.getElementById('pretax').value) || 0;
            const annualTaxable = Math.max(0, annualGross - pretax * periods);

            const isSingle = document.getElementById('filing').value === 'single';
            const orTaxAnnual = calculateOregonTax(annualTaxable, isSingle);
            const orTaxPer = orTaxAnnual / periods;

            const fica = (Math.min(annualGross, 176100) * 0.062 + annualGross * 0.0145) / periods; // 2025 approx SS base

            const netPer = grossPerPeriod - pretax - orTaxPer - fica - (parseFloat(document.getElementById('posttax').value) || 0);

            document.getElementById('results').innerHTML = `
                <h2>Results (per pay period)</h2>
                <p>Gross: <strong>$${grossPerPeriod.toFixed(2)}</strong></p>
                <p>Oregon State Tax: <strong>$${orTaxPer.toFixed(2)}</strong></p>
                <p>FICA (SS + Medicare): <strong>$${fica.toFixed(2)}</strong></p>
                <p class="result">Net Take-Home: $${netPer.toFixed(2)}</p>
                <small>Using 2025 Oregon rates from DOR tables. Federal tax not included in this version. Check official DOR PDF for latest.</small>
            `;
        }

        window.onload = calculate;
    </script>
</body>
</html>
