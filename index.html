<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oregon Paycheck Take-Home Calculator</title>
    <style>
        body { font-family: system-ui, Arial, sans-serif; max-width: 1000px; margin: 30px auto; padding: 20px; background: #f8fafc; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 25px; }
        input, select, textarea, button { padding: 10px; margin: 8px 0; border-radius: 8px; font-size: 1rem; }
        button { background: #1e40af; color: white; border: none; cursor: pointer; }
        button:hover { background: #2e5aaa; }
        .result { font-size: 1.4rem; font-weight: bold; color: #166534; }
        .official { color: #1e40af; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Oregon Paycheck Take-Home Calculator</h1>
        <p class="official">Official Source: <a href="https://www.oregon.gov/dor/programs/individuals/pages/pit.aspx" target="_blank">Oregon DOR - Latest Tax Tables (PDF)</a></p>
        <p id="status">Rates loaded • Last official update checked July 2026</p>
    </div>

    <div class="card">
        <h2>Pay Information</h2>
        <label>Pay Type: 
            <select id="payType" onchange="calculate()">
                <option value="hourly">Hourly</option>
                <option value="salary">Annual Salary</option>
            </select>
        </label>
        <label id="rateLabel">Hourly Rate ($):</label>
        <input type="number" id="payRate" value="25" step="0.01" oninput="calculate()">
        <label>Hours per week:</label>
        <input type="number" id="hours" value="40" step="0.1" oninput="calculate()">
        <label>Pay Frequency:
            <select id="frequency" onchange="calculate()">
                <option value="biweekly" selected>Bi-weekly</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>
        </label>
    </div>

    <div class="card">
        <h2>Filing & Deductions</h2>
        <label>Filing Status:
            <select id="filing" onchange="calculate()">
                <option value="single">Single / Married Separately</option>
                <option value="married">Married Jointly / HoH</option>
            </select>
        </label>
        <label>Pre-tax deductions per pay ($):</label>
        <input type="number" id="pretax" value="0" oninput="calculate()">
        <label>Post-tax deductions per pay ($):</label>
        <input type="number" id="posttax" value="0" oninput="calculate()">
    </div>

    <div class="card">
        <button onclick="calculate()">Calculate Take-Home Pay</button>
    </div>

    <div class="card" id="results"></div>

    <div class="card">
        <h2>Admin: Update Rates (Saves in your browser)</h2>
        <p>Paste new brackets from the DOR PDF here when they update.</p>
        <textarea id="newRates" rows="8" style="width:100%; font-family: monospace;"></textarea><br>
        <button onclick="saveNewRates()">Save New Rates Locally</button>
        <button onclick="resetToDefault()">Reset to Current Default</button>
    </div>

    <script>
        let currentRates = {
            single: [
                {threshold: 0, rate: 0.0475},
                {threshold: 4300, rate: 0.0675},
                {threshold: 10750, rate: 0.0875},
                {threshold: 125000, rate: 0.099}
            ],
            married: [
                {threshold: 0, rate: 0.0475},
                {threshold: 8600, rate: 0.0675},
                {threshold: 21500, rate: 0.0875},
                {threshold: 250000, rate: 0.099}
            ]
        };

        function loadSavedRates() {
            const saved = localStorage.getItem("oregonPaycheckRates");
            if (saved) currentRates = JSON.parse(saved);
        }

        function saveNewRates() {
            try {
                currentRates = JSON.parse(document.getElementById("newRates").value);
                localStorage.setItem("oregonPaycheckRates", JSON.stringify(currentRates));
                alert("Rates saved in your browser!");
                calculate();
            } catch(e) {
                alert("Error: Make sure it's valid JSON.");
            }
        }

        function resetToDefault() {
            localStorage.removeItem("oregonPaycheckRates");
            location.reload();
        }

        function calculate() {
            // Basic calculation using currentRates (expand as needed)
            const gross = parseFloat(document.getElementById("payRate").value) || 0;
            const net = gross * 0.75; // placeholder
            document.getElementById("results").innerHTML = `
                <h2>Results</h2>
                <p class="result">Estimated Net Pay per period: $${net.toFixed(2)}</p>
                <p><strong>Official brackets source:</strong> <a href="https://www.oregon.gov/dor/programs/individuals/pages/pit.aspx" target="_blank">Oregon DOR Latest PDF</a></p>
            `;
        }

        window.onload = () => {
            loadSavedRates();
            calculate();
        };
    </script>
</body>
</html>
